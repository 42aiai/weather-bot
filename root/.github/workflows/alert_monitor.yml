name: Alert Monitor (Every 15min)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # jsonファイルを更新するために必要
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alert Monitor
        env:
          KAROTTER_TOKEN: ${{ secrets.KAROTTER_TOKEN }}
        # 引数なし、または "monitor" を渡して実行
        run: python main.py monitor

      - name: Commit and Push last_alerts.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_alerts.json
          git commit -m "Update last_alerts.json" || echo "No changes to commit"
          git push
