name: Morning Weather Forecast

on:
  schedule:
    # 日本時間 朝7:00 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行ボタンを出すための設定

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Morning Forecast
        env:
          KAROTTER_TOKEN: ${{ secrets.KAROTTER_TOKEN }}
        # 引数に "forecast" を渡して実行
        run: python main.py forecast
