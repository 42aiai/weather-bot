name: Weather and Alert Bot

on:
  schedule:
    - cron: '*/15 * * * *'  # 15分おきに実行
  workflow_dispatch:        # 手動で「Run workflow」ボタンからも実行可能にする

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 警報状態（JSON）を保存するために書き込み権限を与える
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Bot
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          KAROTTER_ID: ${{ secrets.KAROTTER_ID }}
          KAROTTER_PW: ${{ secrets.KAROTTER_PW }}
        run: python main.py  # ←ここを main.py に変更

      - name: Commit and Push last_alerts.json
        run: |
          git config --global user.name "WeatherBot"
          git config --global user.email "bot@example.com"
          git add last_alerts.json
          git commit -m "Update last alerts state" || exit 0
          git push
