name: Morning Weather

on:
  schedule:
    - cron: '0 22 * * *' # UTC 22:00 = JST 7:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # キャッシュは一度オフにして、確実にクリーンインストールさせます
          
      - name: Install dependencies
        run: |
          # 1. 基礎ツールを最新にする（これが無いとgitからのインストールに失敗することがあります）
          python -m pip install --upgrade pip setuptools wheel
          
          # 2. 外部ライブラリを個別にインストール
          pip install requests
          
          # 3. KarotterPyをインストール
          pip install git+https://github.com/kav0tter/KarotterPy.git
          
      - name: Run
        env:
          KAROTTER_API_KEY: ${{ secrets.KAROTTER_API_KEY }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: python main.py
