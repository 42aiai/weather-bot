name: Morning Weather

on:
  schedule:
    - cron: '0 22 * * *' # JST 7:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          # 1. 基礎ツールの更新
          python -m pip install --upgrade pip setuptools wheel
          
          # 2. requestsのインストール
          python -m pip install requests
          
          # 3. KarotterPyを一度クローンして、その中身から直接インストール
          # これなら pip install git+... で失敗する問題を回避できます
          git clone https://github.com/kav0tter/KarotterPy.git
          cd KarotterPy
          python -m pip install .
          cd ..

      - name: Run
        env:
          KAROTTER_API_KEY: ${{ secrets.KAROTTER_API_KEY }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: python main.py
