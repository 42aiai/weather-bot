name: Morning Weather

on:
  schedule:
    - cron: '0 22 * * *' # UTC 22:00 = JST 7:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          # 1. pip自体を最新にする
          python -m pip install --upgrade pip
          
          # 2. requestsをインストール
          pip install requests
          
          # 3. KarotterPyをドキュメント通りのコマンドでインストール
          # (念のためURLをダブルクォーテーションで囲んでいます)
          pip install "git+https://github.com/kav0tter/KarotterPy.git"
          
      - name: Run
        env:
          KAROTTER_API_KEY: ${{ secrets.KAROTTER_API_KEY }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: python main.py
