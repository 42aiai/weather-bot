name: Morning Weather

on:
  schedule:
    - cron: '0 22 * * *' # UTC 22:00 = JST 7:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # ここがポイント：ドキュメント通りのインストールコマンド
          pip install git+https://github.com/kav0tter/KarotterPy.git
          # requestsなど他のライブラリ
          pip install requests
          
      - name: Run
        env:
          # Settings > Secrets で設定した名前と一致させてください
          KAROTTER_API_KEY: ${{ secrets.KAROTTER_API_KEY }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: python main.py
